    <div class="container">
        <h1>Bottle Match 🍾</h1>

        <button class="check-btn" onclick="checkOrder()">Check</button>
        <p id="result"></p>

        <div class="game-board" id="firstBox"></div>

        <div class="game-board" id="secondBox">

            <div class="bottle-box" draggable="true" data-color="red">
                <img src="images/red.png">
            </div>

            <div class="bottle-box" draggable="true" data-color="orange">
                <img src="images/orange.png">
            </div>

            <div class="bottle-box" draggable="true" data-color="yellow">
                <img src="images/yellow.png">
            </div>

            <div class="bottle-box" draggable="true" data-color="green">
                <img src="images/green.png">
            </div>

            <div class="bottle-box" draggable="true" data-color="blue">
                <img src="images/blue.png">
            </div>

        </div>
    </div>

<script src="script.js"></script>
